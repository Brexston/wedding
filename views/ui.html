    <style>
      .project-view {
      	--view-bg: var(--body-bg);
      	--view-color: var(--body-color);
      	--view-block-bg: var(--color-neutral-100);
      	--view-border: var(--default-border);
      	--view-link: var(--body-color);
      	--view-link-hover: var(--color-primary-500);
      	--view-title-color: var(--body-color);
      	--view-check: var(--color-primary-300);
      	position: relative;
      	z-index: 0;
      	display: flex;
      	flex-direction: column;
      	width: 100%;
      	min-height: 100vh;
      	padding: clamp(2.5rem, 1.2944984vw + 2.1966019rem, 3.75rem) 0;
      	background-color: var(--view-bg);
      	color: var(--view-color);
      }
      
      .project-view .default-input__input {
      	min-width: 15.625rem;
      }
      
      .wrapper {
      	display: flex;
      	flex: 1 1 100%;
      	flex-direction: column;
      }
      
      .pv-title {
      	display: flex;
      	flex-wrap: wrap;
      	align-items: center;
      	gap: 1.25rem;
      	margin-bottom: clamp(1.5rem, 2.3300971vw + 0.9538835rem, 3.75rem);
      }
      
      .pv-title__text {
      	margin: 0;
      	color: var(--view-color);
      	font-size: clamp(1.125rem, 0.9061489vw + 0.9126214rem, 2rem);
      	font-weight: 600;
      }
      
      .pv-logo {
      	display: flex;
      	align-items: center;
      	justify-content: center;
      }
      
      .pv-logo__image.img {
      	--width: clamp(11.25rem, 5.8252427vw + 9.8847087rem, 16.875rem);
      	--aspect-ratio: 270/70;
      	--object-fit: contain;
      }
      
      .pv-blocks {
      	width: 100%;
      }
      
      .pv-blocks--columns {
      	column-count: auto;
      	column-width: clamp(16rem, 45vw, 32rem);
      	column-gap: 0.5rem;
      }
      
      .pv-blocks--columns .pv-block {
      	margin-bottom: 0.5rem;
      	break-inside: avoid;
      }
      
      .pv-blocks--list {
      	display: grid;
      	grid-template-columns: minmax(0, 1fr);
      	gap: 1rem;
      }
      
      .pv-block {
      	display: flex;
      	flex-direction: column;
      	width: 100%;
      	padding: clamp(1.25rem, 0.2588997vw + 1.1893204rem, 1.5rem);
      	background-color: var(--view-block-bg);
      }
      
      .pv-block__video {
      	width: 31.25rem;
      	height: 20.8125rem;
      }
      
      .pv-block--dark {
      	background-color: var(--color-neutral-900);
      	color: var(--color-neutral-100);
      	--view-title-color: var(--color-neutral-100);
      }
      
      .pv-block--dark .default-input {
      	--di-color: var(--color-neutral-100);
      	--di-placeholder-color: var(--color-neutral-300);
      	--di-bg: var(--color-neutral-900);
      	--di-bg-hover: var(--color-neutral-900);
      	--di-bg-focus: var(--color-neutral-900);
      	--di-border-color: var(--color-primary-400);
      	--di-border-color-hover: var(--color-primary-300);
      	--di-border-color-focus: var(--color-primary-300);
      	--di-label-color: var(--color-neutral-200);
      	--di-bg-loading: var(--color-neutral-900);
      	--di-bg-loading-gradient: var(--color-neutral-500);
      }
      
      .pv-block__title {
      	margin: 0 0 clamp(2.5rem, -1.0355987vw + 2.7427184rem, 1.5rem);
      	color: var(--view-title-color);
      	font-size: clamp(1.125rem, 0.9061489vw + 0.9126214rem, 2rem);
      	font-weight: 600;
      }
      
      .pv-block__nav {
      	display: flex;
      	flex-direction: column;
      	gap: 0.875rem;
      }
      
      .pv-block__preview {
      	display: flex;
      	flex-wrap: wrap;
      	gap: 1rem;
      	width: 100%;
      }
      
      .pv-block__items {
      	display: flex;
      	flex-direction: column;
      	gap: 1rem;
      	width: 100%;
      	max-width: 100%;
      }
      
      .pv-block__item {
      	max-width: 100%;
      }
      
      .pv-block__devider {
      	flex: 1 1 100%;
      	width: 100%;
      	border-bottom: 0.0625rem solid var(--view-border);
      }
      
      .pv-block__items--row {
      	flex: 1 1 100%;
      	flex-direction: row;
      	flex-wrap: wrap;
      	align-items: flex-end;
      	column-gap: 1rem;
      }
      
      .pv-block__items--align-start {
      	align-items: flex-start;
      }
      
      .skeleton-preview-card {
      	display: flex;
      	flex-direction: column;
      	gap: 0.75rem;
      	width: 17.5rem;
      }
      
      .skeleton-preview-card__image {
      	width: 100%;
      	height: 9.25rem;
      	border-radius: 0.5rem;
      	background-color: var(--color-neutral-200);
      }
      
      .skeleton-preview-card__title {
      	margin: 0;
      	font-size: 1.125rem;
      	line-height: 1.3;
      }
      
      .skeleton-preview-card__text {
      	margin: 0;
      	font-size: 0.875rem;
      	line-height: 1.45;
      }
      
      .skeleton-preview-row {
      	display: flex;
      	align-items: center;
      	gap: 0.875rem;
      	width: 20rem;
      }
      
      .skeleton-preview-row__avatar {
      	flex-shrink: 0;
      	width: 3rem;
      	height: 3rem;
      	border-radius: 50%;
      	background-color: var(--color-neutral-200);
      }
      
      .skeleton-preview-row__content {
      	display: flex;
      	flex-direction: column;
      	gap: 0.375rem;
      }
      
      .skeleton-preview-row__title {
      	font-size: 1rem;
      	line-height: 1.3;
      }
      
      .skeleton-preview-row__text {
      	font-size: 0.875rem;
      	line-height: 1.35;
      }
      
      .skeleton-preview-api-card {
      	display: grid;
      	grid-template-columns: 6rem 1fr;
      	align-items: start;
      	gap: 1rem;
      	width: 22.5rem;
      }
      
      .skeleton-preview-api-card__media {
      	width: 6rem;
      	height: 4.5rem;
      	border-radius: 0.5rem;
      	background-color: var(--color-neutral-200);
      }
      
      .skeleton-preview-api-card__content {
      	display: flex;
      	flex-direction: column;
      	gap: 0.5rem;
      }
      
      .skeleton-preview-api-card__title {
      	margin: 0;
      	font-size: 1rem;
      	line-height: 1.3;
      }
      
      .skeleton-preview-api-card__text {
      	margin: 0;
      	font-size: 0.875rem;
      	line-height: 1.4;
      }
      
      .pv-link {
      	display: flex;
      	align-items: flex-start;
      	justify-content: space-between;
      	gap: 0.5rem;
      	margin: 0;
      	padding: 0;
      	color: var(--view-link);
      	font-size: clamp(1rem, 0.1294498vw + 0.9696602rem, 1.125rem);
      	font-weight: 600;
      	text-decoration: none;
      	transition: color 0.3s ease;
      }
      
      .pv-link::after {
      	content: '';
      	display: block;
      	width: 1.5rem;
      	height: 1.5rem;
      	background-color: var(--view-check);
      }
      
      .pv-link:not(:last-child) {
      	padding-bottom: 0.875rem;
      	border-bottom: 0.0625rem solid var(--view-border);
      }
      
      @media (hover: hover) and (pointer: fine) {
      	.pv-link:hover {
      		color: var(--view-link-hover);
      	}
      }
      
      .pv-link.checked::after {
      	background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 16 16' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill-rule='evenodd' clip-rule='evenodd' d='M6.38541 10.4817L13.2648 3.46179L14.716 4.7934L7.83668 11.8133C7.06234 12.6035 5.76696 12.6202 4.9712 11.8502L1.28369 8.28204L2.69791 6.91362L6.38541 10.4817Z' fill='%23422EFF'/%3E%3C/svg%3E%0A");
      	background-repeat: no-repeat;
      	background-position: center;
      	background-size: 1rem;
      }
      
      .gallery {
      	display: flex;
      	flex-wrap: wrap;
      	gap: 1.875rem;
      }
      
      .gallery__item {
      	display: block;
      	width: 23.4375rem;
      	height: 15.625rem;
      }
    </style>
