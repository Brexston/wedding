		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-title" content="Xpage" />
		<link rel="manifest" href="/site.webmanifest" />

		<!-- OpenGraph -->
		<meta property="og:title" content="%VITE_APP_TITLE%" />

		<meta name="twitter:card" content="summary_large_image"/>

	<body class="page-index">

				<section class="project-view">
					<div class="wrapper">
						<div class="pv-title">
							<a href="/" class="pv-logo pv-title__logo">
								<picture class="pv-logo__image img">
									<img class="img__image" src="/img/logo.svg" alt="logo">
								</picture>
							</a>
							<h1 class="pv-title__text">%VITE_APP_TITLE%</h1>
						</div>
						<div class="pv-blocks pv-blocks--columns">
							<div class="pv-block">
								<h3 class="pv-block__title">Основные страницы</h3>
								<nav class="pv-block__nav">
									<a class="pv-link" href="./views/main.html">Главная страница</a>
									<a class="pv-link" href="./views/contacts.html">Контакты</a>
									<a class="pv-link">...</a>
								</nav>
							</div>
							<div class="pv-block">
								<h3 class="pv-block__title">Корзина и оформление</h3>
								<nav class="pv-block__nav">
									<a class="pv-link" href="./views/cart-empty.html">Корзина (пустая)</a>
									<a class="pv-link" href="./views/cart.html">Корзина</a>
								</nav>
							</div>
							<div class="pv-block">
								<h3 class="pv-block__title">Медиа</h3>
								<nav class="pv-block__nav">
									<a class="pv-link" href="./views/media.html">Медиа</a>
								</nav>
							</div>
							<div class="pv-block">
								<h3 class="pv-block__title">Авторизация и регистрация</h3>
								<nav class="pv-block__nav">
									<a class="pv-link checked" href="./views/auth.html">Авторизация</a>
									<a class="pv-link checked" href="./views/signup.html">Регистрация</a>
									<a class="pv-link checked" href="./views/reset-password.html">Восстановление пароля</a>
								</nav>
							</div>
							<div class="pv-block">
								<h3 class="pv-block__title">Письма</h3>
								<nav class="pv-block__nav">
									<a class="pv-link checked" href="./views/emails/main.html">Шаблон письма</a>

							</div>
							<div class="pv-block">
								<h3 class="pv-block__title">Ошибки</h3>

				</section>
			</main>
			<!-- ---------------------------------------------------------------------------------------- -->
		</div>
		<script type="module" src="/app/main.ts"></script>

</html>
<style>
	.project-view {
		--view-bg: var(--body-bg);
		--view-color: var(--body-color);
		--view-block-bg: var(--color-neutral-100);
		--view-border: var(--default-border);
		--view-link: var(--body-color);
		--view-link-hover: var(--color-primary-500);
		--view-title-color: var(--body-color);
		--view-check: var(--color-primary-300);
		position: relative;
		z-index: 0;
		display: flex;
		flex-direction: column;
		width: 100%;
		min-height: 100vh;
		padding: fluid(60, 40) 0;
		background-color: var(--view-bg);
		color: var(--view-color);
	}
	.project-view .default-input__input {
		min-width: 250px;
	}
	.wrapper {
		display: flex;
		flex: 1 1 100%;
		flex-direction: column;
	}
	.pv-title {
		display: flex;
		flex-wrap: wrap;
		align-items: center;
		gap: 20px;
		margin-bottom: fluid(60, 24);
	}
	.pv-title__text {
		margin: 0;
		color: var(--view-color);
		font-size: fluid(32, 18);
		font-weight: 600;
	}
	.pv-logo {
		display: flex;
		align-items: center;
		justify-content: center;
	}
	.pv-logo__image.img {
		--width: fluid(270, 180);
		--aspect-ratio: 270/70;
		--object-fit: contain;
	}
	.pv-blocks {
		width: 100%;
	}
	.pv-blocks--columns {
		column-count: auto;
		column-width: clamp(16rem, 45vw, 32rem);
		column-gap: 8px;
	}
	.pv-blocks--columns .pv-block {
		margin-bottom: 8px;
		break-inside: avoid;
	}
	.pv-blocks--list {
		display: grid;
		grid-template-columns: minmax(0, 1fr);
		gap: 16px;
	}
	.pv-block {
		display: flex;
		flex-direction: column;
		width: 100%;
		padding: fluid(24, 20);
		background-color: var(--view-block-bg);
	}
	.pv-block__video {
		width: 500px;
		height: 333px;
	}
	.pv-block--dark {
		background-color: var(--color-neutral-900);
		color: var(--color-neutral-100);
	}
	.pv-block--dark .default-input {
		--di-color: var(--color-neutral-100);
		--di-placeholder-color: var(--color-primary-400);
		--di-bg: var(--color-neutral-900);
		--di-bg-hover: var(--color-neutral-900);
		--di-bg-focus: var(--color-neutral-900);
		--di-border-color: var(--color-primary-400);
		--di-border-color-hover: var(--color-primary-300);
		--di-border-color-focus: var(--color-primary-300);
		--di-label-color: var(--color-neutral-200);
		--di-bg-loading: var(--color-neutral-900);
		--di-bg-loading-gradient: var(--color-neutral-500);
	}
	.pv-block__title {
		margin: 0 0 fluid(24, 40);
		color: var(--view-title-color);
		font-size: fluid(32, 18);
		font-weight: 600;
	}
	.pv-block__nav {
		display: flex;
		flex-direction: column;
		gap: 14px;
	}
	.pv-block__preview {
		display: flex;
		flex-wrap: wrap;
		gap: 16px;
		width: 100%;
	}
	.pv-block__items {
		display: flex;
		flex-direction: column;
		gap: 16px;
		width: 100%;
		max-width: 100%;
	}
	.pv-block__item {
		max-width: 100%;
	}
	.pv-block__devider {
		flex: 1 1 100%;
		width: 100%;
		border-bottom: 1px solid var(--view-border);
	}
	.pv-block__items--row {
		flex: 1 1 100%;
		flex-direction: row;
		flex-wrap: wrap;
		align-items: flex-end;
		column-gap: 16px;
	}
	.pv-block__items--align-start {
		align-items: flex-start;
	}
	.pv-link {
		display: flex;
		align-items: flex-start;
		justify-content: space-between;
		gap: 8px;
		margin: 0;
		padding: 0;
		color: var(--view-link);
		font-size: fluid(18, 16);
		font-weight: 600;
		text-decoration: none;
		transition: color 0.3s ease;
	}
	.pv-link::after {
		content: '';
		display: block;
		flex-shrink: 0;
		width: 24px;
		height: 24px;
		background-color: var(--view-check);
	}
	.pv-link:not(:last-child) {
		padding-bottom: 14px;
		border-bottom: 1px solid var(--view-border);
	}
	@media (hover: hover) and (pointer: fine) {
		.pv-link:hover {
			color: var(--view-link-hover);
		}
	}
	.pv-link.checked::after {
		background-image: url("data:image/svg+xml,%3Csvg width='16' height='16' viewBox='0 0 16 16' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath fill-rule='evenodd' clip-rule='evenodd' d='M6.38541 10.4817L13.2648 3.46179L14.716 4.7934L7.83668 11.8133C7.06234 12.6035 5.76696 12.6202 4.9712 11.8502L1.28369 8.28204L2.69791 6.91362L6.38541 10.4817Z' fill='%23422EFF'/%3E%3C/svg%3E%0A");
		background-repeat: no-repeat;
		background-position: center;
		background-size: 16px;
	}
	.gallery {
		display: flex;
		flex-wrap: wrap;
		gap: 30px;
	}
	.gallery__item {
		display: block;
		width: 375px;
		height: 250px;
	}
	.page-index .project-view {
		--view-bg: #fafafa;
		--view-color: #111;
		--view-block-bg: #fff;
		--view-border: #e9e9e9;
		--view-link: #111;
		--view-link-hover: #422eff;
		--view-title-color: #2e1aeb;
		--view-check: #f1f0fc;
	}
</style>
