  <body class="page">
    <div class="layout" id="app">
      <suspense>
        <root-component csrf-token="" :captcha="{ key: &quot;&quot;, type: &quot;yacaptcha&quot; }" :docs="[{ code: 'user-agreement', link: '/agreement/' }, { code: 'privacy-policy', link: '/policy/' }]">
              <header class="header" v-fixed-header>
                <div class="wrapper">
                  <div class="header__inner"><a class="header__logo logo" href="/wedding/">
                          <picture class="img logo__img"><img class="img__image" src="/wedding/img/logo.svg" alt="alt" width="190" height="48" loading="lazy"></picture></a></div>
                </div>
              </header>
          <main class="page__main">
            <media-view :items="[{id: 1, name: 'test', url: '', date: '12.01.2000'}]" :pagination="{ totalItems: 100, limitItems: 10, pageCurrent: 1, showShowMore: true }"></media-view>
          </main>
          <footer class="footer">
            <div class="wrapper">
              <div class="footer__inner"><a class="footer__logo logo" href="/">
                      <picture class="img logo__img"><img class="img__image" src="/wedding/img/logo.svg" alt="alt" width="190" height="48" loading="lazy"></picture></a>
                    <div class="socials footer__socials"><span class="socials__title">соцсети</span>
                      <div class="socials__list"><a class="socials__item" href="#" target="_blank">
                              <picture class="img socials__item-icon"><img class="img__image" src="/wedding/img/content/socials/inst.svg" alt="alt" width="24" height="24" loading="lazy"></picture></a><a class="socials__item" href="#" target="_blank">
                              <picture class="img socials__item-icon"><img class="img__image" src="/wedding/img/content/socials/vk.svg" alt="alt" width="24" height="24" loading="lazy"></picture></a>
                      </div><span class="socials__disclaimer">*meta запрещена на территории РФ</span>
                    </div>
              </div>
            </div>
          </footer>
        </root-component>
      </suspense>
      <div class="modals" id="modals-container">
        <x-modal id="modal-menu-mobile" animation="fade-in-right">
          <template #default="{close}">
            <section class="mobile-menu">
              <div class="mobile-menu__top">
                <button class="mobile-menu__close" data-dialog-close aria-label="закрыть" @click="close">
                      <svg class="icon" aria-hidden="true">
                        <use xlink:href="/wedding/img/icons.6f00ff8f.svg#icon-close"></use>
                      </svg>
                </button>
                <div class="mobile-menu__title title title--h2">Меню</div>
                <div class="mobile-menu__lang-toggle"><a class="mobile-menu__lang-toggle-link active" href="#">Ru</a><a class="mobile-menu__lang-toggle-link" href="#">En</a></div>
              </div>
              <div class="mobile-menu__content">
                <nav class="mobile-menu__nav">
                  <x-accordion class="mobile-menu__nav-item">
                    <template #default="{onToggle, isOpen}">
                      <button class="mobile-menu__nav-el" @click="onToggle"><span class="mobile-menu__nav-name">О комитете</span>
                            <svg class="mobile-menu__nav-icon" aria-hidden="true">
                              <use xlink:href="/wedding/img/icons.6f00ff8f.svg#icon-chevron-down"></use>
                            </svg>
                      </button>
                    </template>
                    <template #body>
                      <div class="mobile-menu__nav-body">
                        <div class="mobile-menu__nav-list">
                          <button class="mobile-menu__nav-link link" @click="openModal('modal-submenu-mobile')">О комитете</button>
                          <button class="mobile-menu__nav-link link" @click="openModal('modal-submenu-mobile')">Пресс-центр</button>
                        </div>
                      </div>
                    </template>
                  </x-accordion>
                  <x-accordion class="mobile-menu__nav-item">
                    <template #default="{onToggle, isOpen}">
                      <button class="mobile-menu__nav-el" @click="onToggle"><span class="mobile-menu__nav-name">Пресс-центр</span>
                            <svg class="mobile-menu__nav-icon" aria-hidden="true">
                              <use xlink:href="/wedding/img/icons.6f00ff8f.svg#icon-chevron-down"></use>
                            </svg>
                      </button>
                    </template>
                    <template #body>
                      <div class="mobile-menu__nav-body">
                        <div class="mobile-menu__nav-list">
                          <button class="mobile-menu__nav-link link" @click="openModal('modal-submenu-mobile')">О комитете</button>
                          <button class="mobile-menu__nav-link link" @click="openModal('modal-submenu-mobile')">Пресс-центр</button>
                        </div>
                      </div>
                    </template>
                  </x-accordion>
                  <div class="mobile-menu__nav-item"><a class="mobile-menu__nav-el" href="#"><span class="mobile-menu__nav-name">Контакты</span></a></div>
                </nav>
              </div>
              <div class="mobile-menu__bottom">
                <div class="mobile-menu__contacts"><a class="mobile-menu__contacts-el link title title--h3" href="mailto:info@olympic.ru">info@xpage.ru</a></div>
                    <div class="socials footer__socials">
                      <div class="socials__list"><a class="socials__item" href="#" target="_blank">
                              <picture class="img socials__item-icon"><img class="img__image" src="/wedding/img/content/socials/inst.svg" alt="alt" width="24" height="24" loading="lazy"></picture></a><a class="socials__item" href="#" target="_blank">
                              <picture class="img socials__item-icon"><img class="img__image" src="/wedding/img/content/socials/vk.svg" alt="alt" width="24" height="24" loading="lazy"></picture></a>
                      </div>
                    </div>
              </div>
            </section>
          </template>
        </x-modal>
      </div>
    </div>
  </body>
